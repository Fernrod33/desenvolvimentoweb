<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>Crie sua Conta</legend>
            <label for="nome">Nome Completo:</label><br>
            <input type="text" id="nome" name="nome" required><br><br>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br><br>
            <label for="senha">Senha (mínimo 8 caracteres):</label><br>
            <input type="password" id="senha" name="senha" required placeholder="seuemail@dominio.com"><br><br>

            <legend>Gênero</legend><br>
            <label for="masculino">Masculino</label>
            <input type="radio" id="masculino" name="genero" value="masculino"><br><br>
            <label for="feminino">Feminino</label>
            <input type="radio" id="feminino" name="genero" value="feminino"><br><br>
            <label for="outro">Outro</label>
            <input type="radio" id="outro" name="genero" value="outro"><br><br>

            <legend>Biografia</legend>
            <textarea id="biografia" name="biografia" rows="4" cols="50" placeholder="Escreva um pouco sobre você"></textarea><br>

            <input type="checkbox" id="termos" name="termos" required>
            <label for="termos"> Li e aceito os termos e condições</label><br>
        </fieldset>
        <input type="submit" value="Registrar">
        <input type="reset" value="Limpar">
    </form>
</body>
</html>
